pluginManagement {
    def flutterSdkPath = {
        // First try environment variable (CI)
        def envPath = System.getenv("FLUTTER_ROOT")
        if (envPath != null) {
            return envPath
        }
        // Then try local.properties (local development)
        def properties = new Properties()
        def localPropertiesFile = file("local.properties")
        if (localPropertiesFile.exists()) {
            localPropertiesFile.withInputStream { properties.load(it) }
            def localPath = properties.getProperty("flutter.sdk")
            if (localPath != null) {
                return localPath
            }
        }
        throw new GradleException("Flutter SDK not found. Set FLUTTER_ROOT environment variable or flutter.sdk in local.properties")
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "7.3.0" apply false
    id "org.jetbrains.kotlin.android" version "1.9.10" apply false
}

include ":app"
