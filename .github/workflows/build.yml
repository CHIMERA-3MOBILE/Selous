name: Build & Release SELous

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'
  JAVA_VERSION: '17'

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Check Java Version
        run: java -version

      - name: Verify Flutter
        run: flutter doctor -v

      - name: Get Dependencies
        run: flutter pub get

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          cat android/local.properties
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          FLUTTER_ROOT: ${{ env.FLUTTER_ROOT }}

      - name: Grant gradlew permissions
        run: chmod +x android/gradlew
      
      - name: Analyze Code
        run: flutter analyze --no-fatal-warnings || true

      - name: Clean and rebuild
        run: |
          flutter clean
          flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle
        run: flutter build appbundle --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SELous-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
      
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: SELous-AAB
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
      
      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: SELous v${{ github.run_number }}
          body: |
            🚀 **SELous Release v${{ github.run_number }}**
            
            **Features:**
            - 🔐 Military-grade AES-256 encryption
            - 🌐 P2P mesh networking
            - 💬 Secure messaging
            - 📱 Cross-platform support
            
            **Downloads:**
            - APK: See artifacts below
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
