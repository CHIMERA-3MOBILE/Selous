name: Build & Release SELous

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.16.0'
  JAVA_VERSION: '17'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      
      - name: Verify Flutter
        run: flutter doctor -v
      
      - name: Get Dependencies
        run: flutter pub get
      
      - name: Analyze Code
        run: flutter analyze --no-fatal-warnings || true
      
      - name: Build APK
        run: flutter build apk --release --verbose
      
      - name: Build App Bundle
        run: flutter build appbundle --release --verbose
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SELous-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
      
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: SELous-AAB
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
      
      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: SELous v${{ github.run_number }}
          body: |
            🚀 **SELous Release v${{ github.run_number }}**
            
            **Features:**
            - 🔐 Military-grade AES-256 encryption
            - 🌐 P2P mesh networking
            - 💬 Secure messaging
            - 📱 Cross-platform support
            
            **Downloads:**
            - APK: See artifacts below
          draft: false
          prerelease: false
